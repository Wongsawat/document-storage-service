# Development configuration with safe defaults for local testing
# DO NOT use these values in production!

app:
  security:
    jwt:
      # Development-only placeholder - auto-generates secure 512-bit secret at startup
      # DevJwtSecretGenerator replaces this with a random secret in dev profile
      secret: GENERATE_DEV_SECRET
      expiration: 86400000  # 24 hours
      refresh-expiration: 604800000  # 7 days
    service:
      username: service-document-storage
      password: dev-secret-password-change-in-production
