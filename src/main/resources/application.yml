server:
  port: 8084

spring:
  application:
    name: document-storage-service

  # PostgreSQL configuration (for outbox_events table)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:documentstorage_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # MongoDB configuration
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DATABASE:document_storage}

  # Servlet configuration for multipart file uploads
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Apache Camel configuration
camel:
  springboot:
    name: document-storage-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Eureka service discovery
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    enabled: ${EUREKA_ENABLED:true}
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.value}

# Application configuration
app:
  # Kafka configuration (used by Apache Camel routes)
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    # Consumer configuration
    consumer:
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:latest}  # earliest for dev, latest for prod
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:100}
      consumers-count: ${KAFKA_CONSUMERS_COUNT:3}
      max-redeliveries: ${KAFKA_MAX_REDELIVERIES:3}
    topics:
      document-stored: document.stored
      dlq: document-storage.dlq
      # Saga topics for PDF document storage
      saga-command-document-storage: saga.command.document-storage
      saga-compensation-document-storage: saga.compensation.document-storage
      saga-reply-document-storage: saga.reply.document-storage
      # Saga topics for unsigned PDF storage (PDF_STORAGE step)
      saga-command-pdf-storage: saga.command.pdf-storage
      saga-compensation-pdf-storage: saga.compensation.pdf-storage
      saga-reply-pdf-storage: saga.reply.pdf-storage
      # Saga topics for signed XML storage
      saga-command-signedxml-storage: saga.command.signedxml-storage
      saga-compensation-signedxml-storage: saga.compensation.signedxml-storage
      saga-reply-signedxml-storage: saga.reply.signedxml-storage

  # Storage configuration
  storage:
    provider: ${STORAGE_PROVIDER:local}  # local or s3
    local:
      base-path: ${LOCAL_STORAGE_PATH:/var/documents}
      base-url: ${STORAGE_BASE_URL:http://localhost:8084/api/v1/documents}
    s3:
      bucket-name: ${S3_BUCKET_NAME:invoice-documents}
      region: ${AWS_REGION:us-east-1}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      base-url: ${S3_BASE_URL:}
      # For S3-compatible storage (Ceph, MinIO, etc.)
      endpoint: ${S3_ENDPOINT:}
      path-style-access: ${S3_PATH_STYLE_ACCESS:false}

  # API versioning configuration
  api:
    version:
      current: ${API_VERSION_CURRENT:v1}
      supported: ${API_VERSION_SUPPORTED:v1}
      deprecated: ${API_VERSION_DEPRECATED:}
      # Minimum deprecation period for old API versions (in days)
      deprecation-period-days: ${API_DEPRECATION_PERIOD_DAYS:180}
    # Base path for all REST endpoints
    base-path: /api
    # Enable API version header check (optional: X-API-Version header)
    header-check-enabled: ${API_HEADER_CHECK_ENABLED:false}
  # Security configuration
  security:
    jwt:
      # Secret key for JWT signing (base64-encoded, minimum 256 bits)
      # REQUIRED: Must be set via environment variable in production
      secret: ${JWT_SECRET}
      # JWT token expiration in milliseconds (default: 24 hours)
      expiration: ${JWT_EXPIRATION:86400000}
      # JWT refresh token expiration in milliseconds (default: 7 days)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
      # Token blacklist configuration
      blacklist:
        size: ${JWT_BLACKLIST_SIZE:10000}
        expire-hours: ${JWT_BLACKLIST_EXPIRE_HOURS:168}  # 7 days
    # Service credentials for inter-service authentication
    service:
      username: ${SERVICE_USERNAME:service-document-storage}
      password: ${SERVICE_PASSWORD:}  # REQUIRED in production
      # JWT token expiration in milliseconds (default: 24 hours)
      expiration: ${JWT_EXPIRATION:86400000}
      # JWT refresh token expiration in milliseconds (default: 7 days)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    # CORS allowed origins (comma-separated)
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:8084}
    # Rate limiting for authentication endpoints
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
      block-duration-seconds: ${RATE_LIMIT_BLOCK_DURATION_SECONDS:300}
    # Outbox reconciliation configuration
    reconciliation:
      enabled: ${RECONCILIATION_ENABLED:true}
      batch-size: ${RECONCILIATION_BATCH_SIZE:100}
      lookback-minutes: ${RECONCILIATION_LOOKBACK_MINUTES:60}
      retention-days: ${RECONCILIATION_RETENTION_DAYS:30}
      cron: "${RECONCILIATION_CRON:0 */15 * * * *}"
      cleanup-cron: "${RECONCILIATION_CLEANUP_CRON:0 0 2 * * *}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes,resilience4j
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true

  # Distributed tracing with OpenTelemetry
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}  # 10% sampling
  otlp:
    tracing:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4317}  # OTLP gRPC endpoint
  metrics:
    export:
      otlp:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:false}
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.wpanther.storage: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenTelemetry configuration
otel:
  resource:
    attributes:
      service.name: ${spring.application.name}
      service.version: ${info.version:1.0.0-SNAPSHOT}
      deployment.environment: ${DEPLOYMENT_ENV:local}
  exporter:
    otlp:
      traces:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317/v1/traces}
      metrics:
        endpoint: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4317/v1/metrics}
  batch:
    enabled: true
    timeout: ${OTEL_BATCH_TIMEOUT:30000}  # 30 seconds
    maxQueueSize: ${OTEL_BATCH_MAX_QUEUE_SIZE:2048}
    maxExportBatchSize: ${OTEL_BATCH_MAX_EXPORT_SIZE:512}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}  # otlp, logging, none
    sampler:
      type: ${OTEL_TRACES_SAMPLER_TYPE:traceidratio}
      ratio: ${OTEL_TRACES_SAMPLER_RATIO:0.1}  # 10% sampling
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:otlp}  # otlp, prometheus, none

# Resilience4j configuration for circuit breakers, retry, and time limiter
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 100
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 10
        record-exceptions:
          - java.io.IOException
          - java.lang.InterruptedException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
    instances:
      pdfDownloadService:
        base-config: default
      externalHttpService:
        base-config: default

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.lang.InterruptedException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
    instances:
      pdfDownloadRetry:
        base-config: default
      externalHttpRetry:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 30s
    instances:
      pdfDownloadTimeout:
        base-config: default
      externalHttpTimeout:
        base-config: default
