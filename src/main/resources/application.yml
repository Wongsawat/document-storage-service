server:
  port: 8084

spring:
  application:
    name: document-storage-service

  # PostgreSQL configuration (for outbox_events table)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:documentstorage_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # MongoDB configuration
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DATABASE:document_storage}

  # Servlet configuration for multipart file uploads
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Apache Camel configuration
camel:
  springboot:
    name: document-storage-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Eureka service discovery
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    enabled: ${EUREKA_ENABLED:true}
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.value}

# Application configuration
app:
  # Kafka configuration (used by Apache Camel routes)
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    # Consumer configuration
    consumer:
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:latest}  # earliest for dev, latest for prod
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:100}
      consumers-count: ${KAFKA_CONSUMERS_COUNT:3}
      max-redeliveries: ${KAFKA_MAX_REDELIVERIES:3}
    topics:
      document-stored: document.stored
      dlq: document-storage.dlq
      # Saga topics for PDF document storage
      saga-command-document-storage: saga.command.document-storage
      saga-compensation-document-storage: saga.compensation.document-storage
      saga-reply-document-storage: saga.reply.document-storage
      # Saga topics for unsigned PDF storage (PDF_STORAGE step)
      saga-command-pdf-storage: saga.command.pdf-storage
      saga-compensation-pdf-storage: saga.compensation.pdf-storage
      saga-reply-pdf-storage: saga.reply.pdf-storage
      # Saga topics for signed XML storage
      saga-command-signedxml-storage: saga.command.signedxml-storage
      saga-compensation-signedxml-storage: saga.compensation.signedxml-storage
      saga-reply-signedxml-storage: saga.reply.signedxml-storage

  # Storage configuration
  storage:
    provider: ${STORAGE_PROVIDER:local}  # local or s3
    local:
      base-path: ${LOCAL_STORAGE_PATH:/var/documents}
      base-url: ${STORAGE_BASE_URL:http://localhost:8084/api/v1/documents}
    s3:
      bucket-name: ${S3_BUCKET_NAME:invoice-documents}
      region: ${AWS_REGION:us-east-1}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      base-url: ${S3_BASE_URL:}
      # For S3-compatible storage (Ceph, MinIO, etc.)
      endpoint: ${S3_ENDPOINT:}
      path-style-access: ${S3_PATH_STYLE_ACCESS:false}

  # Security configuration
  security:
    jwt:
      # Secret key for JWT signing (base64-encoded, minimum 256 bits)
      # REQUIRED: Must be set via environment variable in production
      secret: ${JWT_SECRET}
      # JWT token expiration in milliseconds (default: 24 hours)
      expiration: ${JWT_EXPIRATION:86400000}
      # JWT refresh token expiration in milliseconds (default: 7 days)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
      # Token blacklist configuration
      blacklist:
        size: ${JWT_BLACKLIST_SIZE:10000}
        expire-hours: ${JWT_BLACKLIST_EXPIRE_HOURS:168}  # 7 days
    # Service credentials for inter-service authentication
    service:
      username: ${SERVICE_USERNAME:service-document-storage}
      password: ${SERVICE_PASSWORD:}  # REQUIRED in production
      # JWT token expiration in milliseconds (default: 24 hours)
      expiration: ${JWT_EXPIRATION:86400000}
      # JWT refresh token expiration in milliseconds (default: 7 days)
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    # CORS allowed origins (comma-separated)
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:8084}
    # Rate limiting for authentication endpoints
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
      block-duration-seconds: ${RATE_LIMIT_BLOCK_DURATION_SECONDS:300}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true

# Logging
logging:
  level:
    com.wpanther.storage: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
