# Testcontainers configuration for document-storage-service

# Use Docker instead of Podman for container lifecycle
# This is needed when the system has both Docker and Podman installed
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy

# Disable image reuse to ensure clean state for each test
testcontainers.reuse.enable=false

# Wait timeout for container startup (in milliseconds)
testcontainers.container.wait.timeout=120000

# Check if containers are running
testcontainers.check.disable=false
