spring:
  application:
    name: document-storage-service

  # Allow bean definition overriding for security config
  main:
    allow-bean-definition-overriding: true

  # PostgreSQL configuration for tests
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5433/documentstorage_test}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # MongoDB configuration for tests
  data:
    mongodb:
      uri: ${MONGO_CONNECTION_STRING:mongodb://localhost:27018/document_storage_test}

  # Set embedded MongoDB version for when it gets enabled
  de:
    flapdoodle:
      mongodb:
        embedded:
          version: 7.0.5

  # Flyway disabled for tests (schema created by Hibernate)
  flyway:
    enabled: false

# Kafka configuration for tests
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
  consumer:
    auto-offset-reset: earliest
    enable-auto-commit: false

# Storage configuration
app:
  storage:
    provider: local
    local:
      base-path: ${java.io.tmpdir}/test-documents
      base-url: http://localhost:8084/api/v1/documents

  # Resilience configuration for tests
  resilience:
    pdf-download:
      sliding-window-size: 100
      failure-rate-threshold: 50
      wait-duration-in-open-state: 30s
      permitted-number-of-calls-in-half-open-state: 10
    retry:
      max-attempts: 3
      wait-duration: 500ms
    timeout:
      duration: 30s

  # Disable reconciliation in tests
  reconciliation:
    enabled: false

  # Security configuration
  security:
    jwt:
      secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHktMTIzNDU2Nzg=
      expiration: 86400000
      refresh-expiration: 604800000

# Logging for tests
logging:
  level:
    com.wpanther.storage: INFO
    org.testcontainers: INFO
    org.apache.camel: WARN
